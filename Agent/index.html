<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrapeAI Logo Showcase</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- ESTILOS CSS EMBEBIDOS --- */
        :root {
            --primary-color: #673AB7;       /* Púrpura Principal */
            --primary-dark: #512DA8;      /* Púrpura Oscuro */
            --secondary-color: #FFC107;    /* Amarillo Acento */
            --secondary-light: #FFECB3;  /* Amarillo Claro */
            --text-on-primary: #FFFFFF;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(145deg, var(--primary-dark) 0%, var(--primary-color) 50%, #4527a0 100%); /* Gradiente Púrpura oscuro */
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-on-primary);
        }

        #particles-js-logo {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .logo-container {
            position: relative;
            z-index: 2;
            text-align: center;
            animation: fadeInLogo 2s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeInLogo {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-icon {
            font-size: 5rem; /* Tamaño del ícono de hoja */
            color: var(--secondary-color);
            margin-bottom: 0.5rem;
            text-shadow: 0 0 15px rgba(255, 193, 7, 0.7), 0 0 25px rgba(255, 193, 7, 0.5);
            animation: pulseIcon 2.5s infinite ease-in-out;
        }
        
        @keyframes pulseIcon {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        .logo-text {
            font-size: 4.5rem; /* Tamaño del texto "GrapeAI" */
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(135deg, var(--primary-light) 30%, var(--primary-color) 60%, var(--primary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;

             /* Ajustar las sombras para más nitidez */
            text-shadow: 
                0 0 2px rgb(243, 227, 3), /* Delgada línea clara */
                1px 1px 2px rgba(0, 0, 0, 0.2); /* Sombra oscura sutil para profundidad */
    
             margin: 0;
        }

        .logo-subtitle {
            font-size: 1.2rem;
            font-weight: 300;
            color: var(--primary-light);
            margin-top: 0.75rem;
            letter-spacing: 0.5px;
            opacity: 0;
            animation: fadeInSubtitle 2s ease-out 1s forwards; /* Retraso para que aparezca después del logo */
        }

        @keyframes fadeInSubtitle {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tech-icons-showcase {
            margin-top: 2.5rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
            opacity: 0;
            animation: fadeInTechIcons 2s ease-out 1.5s forwards; /* Retraso mayor */
        }

        .tech-icon-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--primary-light);
            transition: transform 0.3s ease, color 0.3s ease;
        }
        
        .tech-icon-item:hover {
            transform: scale(1.1);
            color: var(--secondary-light);
        }

        .tech-icon-item i {
            font-size: 2rem;
            padding: 0.8rem;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.08);
            border: 2px solid var(--secondary-color);
            color: var(--secondary-color);
            margin-bottom: 0.5rem;
            box-shadow: 0 0 10px rgba(255, 193, 7, 0.3);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        .tech-icon-item:hover i {
            background-color: var(--secondary-color);
            color: var(--primary-dark);
        }

        .tech-icon-item span {
            font-size: 0.8rem;
            font-weight: 500;
        }

    </style>
</head>
<body>
    <div id="particles-js-logo"></div>

    <div class="logo-container">
        <div class="logo-icon">
            <i class="fas fa-leaf"></i>
        </div>
        <h1 class="logo-text">GrapeAI</h1>
        <p class="logo-subtitle">Detección Inteligente de Enfermedades en Vides</p>
        
        <div class="tech-icons-showcase">
            <div class="tech-icon-item">
                <i class="fas fa-brain"></i>
                <span>CNN</span>
            </div>
            <div class="tech-icon-item">
                <i class="fas fa-sitemap"></i>
                <span>Árbol Decisión</span>
            </div>
            <div class="tech-icon-item">
                <i class="fas fa-user-cog"></i>
                <span>Sis. Experto</span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // --- SCRIPT DE PARTICLES.JS EMBEBIDO ---
        if (window.particlesJS) {
            particlesJS('particles-js-logo', {
                "particles": {
                    "number": {
                        "value": 80, // Más partículas
                        "density": {
                            "enable": true,
                            "value_area": 900
                        }
                    },
                    "color": {
                        "value": "#FFECB3" // Amarillo claro (var(--secondary-light)) para las partículas
                    },
                    "shape": {
                        "type": "circle",
                        "stroke": { "width": 0, "color": "#000000" }
                    },
                    "opacity": {
                        "value": 0.6,
                        "random": true,
                        "anim": { "enable": true, "speed": 0.5, "opacity_min": 0.1, "sync": false }
                    },
                    "size": {
                        "value": 3.5,
                        "random": true,
                        "anim": { "enable": true, "speed": 2, "size_min": 0.3, "sync": false }
                    },
                    "line_linked": {
                        "enable": true,
                        "distance": 160,
                        "color": "#FFD54F", // Amarillo un poco más oscuro para líneas (var(--secondary-color) más claro)
                        "opacity": 0.3,
                        "width": 1
                    },
                    "move": {
                        "enable": true,
                        "speed": 3, // Un poco más lento para un efecto elegante
                        "direction": "none",
                        "random": true,
                        "straight": false,
                        "out_mode": "out",
                        "bounce": false,
                        "attract": { "enable": false, "rotateX": 600, "rotateY": 1200 }
                    }
                },
                "interactivity": {
                    "detect_on": "canvas",
                    "events": {
                        "onhover": { "enable": true, "mode": "grab" }, // Cambio a grab para un efecto sutil
                        "onclick": { "enable": true, "mode": "push" },
                        "resize": true
                    },
                    "modes": {
                        "grab": { "distance": 140, "line_linked": { "opacity": 0.7 } },
                        "bubble": { "distance": 200, "size": 6, "duration": 2, "opacity": 0.8 },
                        "repulse": { "distance": 100, "duration": 0.4 },
                        "push": { "particles_nb": 3 },
                        "remove": { "particles_nb": 2 }
                    }
                },
                "retina_detect": true
            });
        } else {
            console.warn("Particles.js no se pudo cargar.");
        }
    </script>
</body>
</html>
